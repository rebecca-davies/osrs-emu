# Local single-host stack: Postgres and the all-in-one server launcher.
#
# `name:` fixes the Compose PROJECT name, so every `docker compose` command scoped to this
# file only ever touches this project's containers — it can NOT affect the unrelated Postgres
# stacks on this box (rotmgemu / uber_scraper / uber-tracker).
name: osrsemu

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: osrsemu
      POSTGRES_USER: osrsemu
      POSTGRES_PASSWORD: osrsemu-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osrsemu -d osrsemu"]
      interval: 1s
      timeout: 3s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: "osrsemu-server:${OSRS_IMAGE_TAG:-dev}"
    container_name: osrsemu-server
    # Compose file-secrets are read-only bind mounts and retain host ownership. Run as the asset
    # owner (exported by deploy.sh) so a host-mode-0600 RSA key remains readable without root.
    user: "${OSRS_RUNTIME_UID:-1000}:${OSRS_RUNTIME_GID:-1000}"
    # Survive host reboots / daemon restarts, but do not fight a manual `stop`.
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${OSRS_GATEWAY_PORT:-43594}:43594"
    environment:
      OSRS_CACHE_DIR: /data/cache-data
      OSRS_SERVER_RSA_PROPERTIES: /run/secrets/server_rsa
      # Reach Postgres by its Compose service name. PostgreSQL is deliberately not published to
      # the host, avoiding collisions with development/test databases.
      OSRS_DATABASE_URL: jdbc:postgresql://postgres:5432/osrsemu
      OSRS_DATABASE_USER: osrsemu
      OSRS_DATABASE_PASSWORD: osrsemu-dev
    volumes:
      # The gitignored runtime assets, bind-mounted READ-ONLY from the host — never baked into
      # the image. Sources MUST be absolute host paths when deploying via act (the host Docker
      # daemon resolves them); scripts/deploy.sh sets these to the real host paths and validates them.
      - ${OSRS_CACHE_DIR:-./cache-data}:/data/cache-data:ro
    secrets:
      - server_rsa
    healthcheck:
      # Passively confirm the server holds a LISTEN socket on 43594 (0xAA4A) by reading the
      # kernel socket tables (state 0A = LISTEN, remote all-zeros). Checks /proc/net/tcp and
      # /proc/net/tcp6 (the gateway binds an IPv6 wildcard). Deliberately does NOT open a client
      # connection — a bare connect-then-close would make the gateway log a read-EOF ERROR each probe.
      test: ["CMD-SHELL", "test -r /run/secrets/server_rsa && grep -qiE '^[[:space:]]*[0-9]+:[[:space:]]+[0-9A-F]+:AA4A[[:space:]]+[0-9A-F]+:0000[[:space:]]+0A' /proc/net/tcp /proc/net/tcp6"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

volumes:
  postgres-data:

secrets:
  server_rsa:
    file: ${OSRS_SERVER_RSA_PROPERTIES:-./server-rsa.properties}
