name: osrsemu-local-dev

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: osrsemu
      POSTGRES_USER: osrsemu
      POSTGRES_PASSWORD: osrsemu-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osrsemu -d osrsemu"]
      interval: 1s
      timeout: 3s
      retries: 30
    ports:
      - "127.0.0.1:${OSRS_LOCAL_DATABASE_PORT:-54331}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
